<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>位相と進行波の可視化</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />


<!-- React 本体 -->
<script src="https://unpkg.com/react@18/umdtion.min.js</script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>

<!-- JSX をそのまま書くため -->
<script src="https://unpkg.com/babel-standalone@6/babel.min.js"></script>

</head>

<body>
<div id="root"></div>

<script type="text/babel">
/* =====================================================
   共通：位相回転円（位相のみ）
===================================================== */
function PhaseCircle({ phase, label }) {
  const cx = 460;
  const cy = 80;
  const r = 35;
  const x = cx + r * Math.cos(phase);
  const y = cy - r * Math.sin(phase);

  return (
    <svg width="520" height="160">
      <text x="20" y="24">{label}</text>
      <circle cx={cx} cy={cy} r={r} fill="none" stroke="#666" />
      <line x1={cx} y1={cy} x2={x} y2={y}
            stroke="#0066cc" strokeWidth="3" />
      <circle cx={x} cy={y} r="4" fill="#cc0000" />
      <text x={cx - 22} y={cy + r + 18} fontSize="12">位相 φ</text>
    </svg>
  );
}

// =====================================================
// 音圧レベル関連
// =====================================================
const P0 = 2e-5; // 20 μPa

function dbToPa(db) {
  return P0 * Math.pow(10, db / 20);
}

/* =====================================================
   進行波（最終・公開用）
===================================================== */
function PhaseWave() {
  const [freq, setFreq] = React.useState(0.5);
  const [db, setDb] = React.useState(40);
  const [playing, setPlaying] = React.useState(true);

  const phaseRef = React.useRef(0);
  const [, forceUpdate] = React.useState(0);

  const omega = 2 * Math.PI * freq;

  React.useEffect(() => {
    if (!playing) return;
    let last = performance.now();
    let id;

    const tick = (now) => {
      const dt = (now - last) / 1000;
      last = now;
      phaseRef.current =
        (phaseRef.current + omega * dt * 0.6) % (2 * Math.PI);
      forceUpdate(v => v + 1);
      id = requestAnimationFrame(tick);
    };

    id = requestAnimationFrame(tick);
    return () => cancelAnimationFrame(id);
  }, [omega, playing]);

  const phase = phaseRef.current;
  const muPa = Math.round(dbToPa(db) * 1e6);

  const AMP_MIN = 2;
  const AMP_MAX = 90;
  const ampVis = AMP_MIN + (db / 100) * (AMP_MAX - AMP_MIN);

  const k = 0.15 * freq;
  const wave = [];
  for (let x = 0; x <= 300; x += 2) {
    wave.push(`${20 + x},${150 - ampVis * Math.sin(phase + k * x)}`);
  }

  return (
    <div style={{ textAlign: "center", fontFamily: "sans-serif" }}>
      <h2>位相と進行波（0–100 dB SPL）</h2>

      <PhaseCircle phase={phase} label="進行波の位相 φ" />

      <svg width="520" height="240">
        <polyline
          points={wave.join(" ")}
          fill="none"
          stroke="green"
          strokeWidth="2"
        />
      </svg>

      <div style={{ marginTop: 8 }}>
        周波数 f =
        <input
          type="range"
          min="0.1"
          max="1.0"
          step="0.1"
          value={freq}
          onChange={e => setFreq(Number(e.target.value))}
          style={{ width: 200, margin: "0 8px" }}
        />
        <b>{freq.toFixed(1)} Hz</b>
      </div>

      <div style={{ marginTop: 12 }}>
        音圧レベル Lp =
        <input
          type="range"
          min="0"
          max="100"
          step="1"
          value={db}
          onChange={e => setDb(Number(e.target.value))}
          style={{ width: 280, margin: "0 8px" }}
        />
        <b>{db} dB</b>
      </div>

      <div style={{ marginTop: 16 }}>
        <b>音圧（物理量・単位：μPa）</b><br />
        <span style={{ color: "#0066cc", fontWeight: 500 }}>
          {muPa.toLocaleString()} μPa
        </span>
        <span style={{ fontSize: 12, color: "#555", marginLeft: 6 }}>
          （= {dbToPa(db).toFixed(5)}{" "}
          <span style={{ fontFamily: "monospace" }}>Pa</span>）
        </span>
      </div>

      <div style={{ fontSize: 12, color: "#555", marginTop: 6 }}>
        ※ 0 dB SPL = 20 μPa（人の可聴下限）<br />
        ※ +20 dB ごとに音圧は 10 倍
      </div>

      <button onClick={() => setPlaying(p => !p)}
              style={{ marginTop: 12 }}>
        {playing ? "停止" : "再生"}
      </button>
    </div>
  );
}

// =====================================================
// マウント
// =====================================================
ReactDOM.createRoot(
  document.getElementById("root")
).render(<PhaseWave />);
</script>
</body>
</html>
